<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Connect Four</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #14141e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #ccc;
    flex-direction: column;
    overflow: hidden;
  }
  #canvas-container {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(60, 140, 255, 0.15);
  }
  canvas.emscripten {
    display: block;
    border: none;
    outline: none;
  }
  .loading {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .loading h2 { color: #3c8cff; margin-bottom: 12px; }
  .loading .bar {
    width: 200px; height: 6px;
    background: #2a2a3a;
    border-radius: 3px;
    overflow: hidden;
    margin: 0 auto;
  }
  .loading .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #3c8cff, #ff4646);
    width: 0%;
    transition: width 0.3s;
    border-radius: 3px;
  }
  .hidden { display: none; }
</style>
</head>
<body>
<div id="canvas-container">
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <div class="loading" id="loading">
    <h2>3D Connect Four</h2>
    <p>Loading...</p>
    <div class="bar"><div class="bar-fill" id="progress"></div></div>
  </div>
</div>

<script>
  var Module = {
    canvas: (function() { return document.getElementById('canvas'); })(),
    onRuntimeInitialized: function() {
      document.getElementById('loading').classList.add('hidden');
    },
    setStatus: function(text) {
      var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
      if (m) {
        var pct = (parseInt(m[2]) / parseInt(m[4])) * 100;
        document.getElementById('progress').style.width = pct + '%';
      }
    },
    totalDependencies: 0,
    monitorRunDependencies: function(left) {
      this.totalDependencies = Math.max(this.totalDependencies, left);
      Module.setStatus(left ? 'Loading... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : '');
    }
  };
  Module.setStatus('Downloading...');
</script>
{{{ SCRIPT }}}
</body>
</html>
