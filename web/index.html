<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Connect Four</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #14141e;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #ccc;
  }
  .container {
    text-align: center;
    max-width: 600px;
    padding: 40px 24px;
  }
  h1 {
    font-size: 48px;
    color: #fff;
    margin-bottom: 8px;
    letter-spacing: -1px;
  }
  .subtitle {
    font-size: 18px;
    color: #888;
    margin-bottom: 48px;
  }
  .cards {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .card {
    background: #1e1e2e;
    border-radius: 16px;
    padding: 36px 32px;
    width: 240px;
    text-decoration: none;
    color: #ccc;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1px solid #2a2a3a;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(60, 140, 255, 0.15);
    border-color: #3c8cff44;
  }
  .card-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }
  .card h2 {
    color: #fff;
    font-size: 20px;
    margin-bottom: 8px;
  }
  .card p {
    font-size: 14px;
    color: #888;
    line-height: 1.5;
  }
  .card-ai .card-icon { color: #ff4646; }
  .card-mp .card-icon { color: #3c8cff; }

  .board-preview {
    margin-top: 48px;
    display: flex;
    justify-content: center;
    gap: 6px;
  }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    opacity: 0.3;
  }
  .dot:nth-child(odd) { background: #3c8cff; }
  .dot:nth-child(even) { background: #ff4646; }

  .footer {
    margin-top: 40px;
    font-size: 13px;
    color: #555;
  }
  .footer a { color: #3c8cff; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>3D Connect Four</h1>
  <p class="subtitle">4&times;4&times;4 board &mdash; get four in a row in any direction</p>

  <div class="cards">
    <a class="card card-ai" href="ai.html">
      <span class="card-icon">&#x1F916;</span>
      <h2>Play vs AI</h2>
      <p>Challenge a Monte Carlo Tree Search AI opponent</p>
    </a>
    <a class="card card-mp" href="multiplayer.html">
      <span class="card-icon">&#x1F310;</span>
      <h2>Play Online</h2>
      <p>Create a link and play with a friend &mdash; no server needed</p>
    </a>
  </div>

  <div class="board-preview">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <div class="footer">
    Built with C++/WASM &bull; <a href="https://github.com/lucaswade0/3D-Connect-4">Source on GitHub</a>
  </div>
</div>
</body>
</html>
